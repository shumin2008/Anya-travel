<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anya x Travel</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { --shisa-orange: #FFB74D; --shisa-deep-orange: #E65100; --shisa-brown: #5D4037; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f4f1ea; color: var(--shisa-brown); }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .handwritten-card { background-color: white; border-radius: 2px 15px 5px 12px / 15px 5px 12px 2px !important; box-shadow: 2px 4px 12px rgba(0,0,0,0.08); border: 1px solid rgba(0,0,0,0.03); }
        .title-input { background: transparent; border: none; font-weight: 900; font-size: 1.25rem; width: 100%; color: var(--shisa-brown); outline: none; }
        .slide-enter-active, .slide-leave-active { transition: transform 0.3s ease; }
        .slide-enter-from, .slide-leave-to { transform: translateX(-100%); }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <div id="app" class="flex flex-col h-full max-w-md mx-auto w-full bg-[#fdfaf5] shadow-2xl relative sm:my-4 sm:h-[95vh] border-x border-orange-100 sm:rounded-3xl overflow-hidden">

        <header class="bg-[#FFB74D] text-[#5D4037] shrink-0 z-20 shadow-md">
            <div class="p-4 flex justify-between items-center gap-2">
                <button @click="showTripMenu = true"><i class="ph-bold ph-list text-2xl"></i></button>
                <div class="flex items-center gap-2 overflow-hidden flex-1">
                    <div class="w-10 h-10 rounded-full bg-white border-2 border-orange-400 p-0.5 overflow-hidden flex-shrink-0 flex items-center justify-center">
                        <img src="https://cdn.phototourl.com/uploads/2026-02-27-c58164d7-98bb-4a27-aad2-0d7b756f4be4.jpg" class="w-full h-full object-contain">
                    </div>
                    <div class="overflow-hidden flex-1">
                        <input v-model="setup.destination" class="title-input" @change="saveToCloud" placeholder="旅程名稱">
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <i class="ph-bold ph-arrows-clockwise" :class="{'animate-spin text-green-600': isSyncing}"></i>
                    <button @click="copyShareLink" class="p-2 bg-white/20 rounded-lg"><i class="ph-bold ph-share-network text-lg"></i></button>
                </div>
            </div>
            
            <div class="flex items-center justify-around bg-white/20 p-2 border-t border-white/10">
                <button @click="viewMode = 'plan'" :class="viewMode === 'plan' ? 'bg-white text-orange-700 shadow-sm' : 'text-orange-900/50'" class="p-2 rounded-xl transition-all flex-1 mx-1 flex justify-center"><i class="ph-bold ph-calendar-check text-xl"></i></button>
                <button @click="viewMode = 'pack'" :class="viewMode === 'pack' ? 'bg-white text-orange-700 shadow-sm' : 'text-orange-900/50'" class="p-2 rounded-xl transition-all flex-1 mx-1 flex justify-center"><i class="ph-bold ph-suitcase-rolling text-xl"></i></button>
                <button @click="viewMode = 'map'" :class="viewMode === 'map' ? 'bg-white text-orange-700 shadow-sm' : 'text-orange-900/50'" class="p-2 rounded-xl transition-all flex-1 mx-1 flex justify-center"><i class="ph-bold ph-map-trifold text-xl"></i></button>
                <button @click="viewMode = 'coupons'" :class="viewMode === 'coupons' ? 'bg-white text-orange-700 shadow-sm' : 'text-orange-900/50'" class="p-2 rounded-xl transition-all flex-1 mx-1 flex justify-center"><i class="ph-bold ph-ticket text-xl"></i></button>
                <button @click="viewMode = 'money'" :class="viewMode === 'money' ? 'bg-white text-orange-700 shadow-sm' : 'text-orange-900/50'" class="p-2 rounded-xl transition-all flex-1 mx-1 flex justify-center"><i class="ph-bold ph-currency-dollar text-xl"></i></button>
            </div>

            <div v-if="viewMode === 'plan' || viewMode === 'map'" class="flex overflow-x-auto hide-scroll px-3 py-2 space-x-3 snap-x">
                <div v-for="(day, index) in days" :key="index" @click="currentDayIdx = index" class="snap-center shrink-0 flex flex-col items-center justify-center w-12 h-12 rounded-2xl cursor-pointer border-2 transition-all" :class="currentDayIdx === index ? 'bg-white text-[#E65100] border-white shadow-lg' : 'bg-white/30 text-orange-900/40 border-transparent'">
                    <span class="text-xs font-black">D{{ index + 1 }}</span>
                </div>
                <button @click="addDay" class="shrink-0 w-10 h-12 rounded-2xl border-2 border-dashed border-white/40 text-white/50"><i class="ph-bold ph-plus"></i></button>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto relative hide-scroll bg-[#fdfaf5]">
            
            <div v-if="viewMode === 'plan'" class="p-4 pb-24">
                <div class="handwritten-card p-4 mb-4 border-l-8 border-orange-400">
                    <h2 class="text-2xl font-black">{{ currentDay.date || '未設定日期' }}</h2>
                    <input v-model="currentDay.title" class="text-sm bg-transparent border-none w-full p-0 font-bold focus:ring-0" placeholder="今天的計畫是..." @change="saveToCloud">
                </div>
                
                <div class="relative pl-4 border-l-2 border-orange-200 space-y-6">
                    <div v-for="(item, idx) in currentDay.items" :key="idx" class="handwritten-card p-4 group">
                        <div class="flex gap-4 items-start">
                            <div class="flex flex-col gap-2 shrink-0">
                                <input v-model="item.time" type="time" class="font-bold text-orange-700 bg-orange-50 rounded-lg p-1 text-xs border-none" @change="saveToCloud">
                                <select v-model="item.type" class="text-[11px] font-bold text-orange-600 bg-orange-50 border-none rounded-lg" @change="saveToCloud">
                                    <option value="spot">📍 景點</option><option value="food">🍴 美食</option><option value="hotel">🏨 住宿</option>
                                </select>
                            </div>
                            <div class="flex-1 min-w-0">
                                <input v-model="item.activity" class="font-black text-slate-700 bg-transparent border-none p-0 w-full text-lg focus:ring-0" placeholder="目的地名稱" @change="saveToCloud">
                                <input v-model="item.location" class="text-[10px] text-slate-400 bg-transparent border-none p-0 w-full mt-1 focus:ring-0" placeholder="地址或導航地址" @change="saveToCloud">
                                <input v-model="item.note" class="text-[10px] text-orange-800/60 bg-orange-50/50 rounded p-1 w-full mt-2 border-none" placeholder="備註: MapCode/必吃" @change="saveToCloud">
                            </div>
                            <div class="flex flex-col gap-3">
                                <a :href="getMapLink(item)" target="_blank" class="text-teal-500"><i class="ph-bold ph-paper-plane-tilt text-2xl"></i></a>
                                <button @click="removeItem(idx)" class="text-red-200"><i class="ph-bold ph-trash text-xl"></i></button>
                            </div>
                        </div>
                    </div>
                    <button @click="addItem" class="text-orange-500 font-bold text-sm flex items-center gap-1"><i class="ph-bold ph-plus-circle"></i> 加入新行程項目</button>
                </div>
            </div>

            <div v-if="viewMode === 'pack'" class="p-4 pb-24">
                <div class="bg-indigo-600 text-white rounded-3xl p-6 shadow-xl mb-4 relative overflow-hidden">
                    <h2 class="text-2xl font-black">行李清單</h2>
                    <div class="mt-4 bg-white/20 rounded-full h-2"><div class="bg-white h-full transition-all" :style="{ width: packProgress + '%' }"></div></div>
                </div>
                <div class="handwritten-card p-4 flex gap-2 mb-4"><input v-model="newPackItem" @keyup.enter="addPack" placeholder="需要帶什麼？" class="flex-1 border-none bg-slate-50 rounded-xl px-4 py-3"><button @click="addPack" class="bg-indigo-500 text-white px-4 rounded-xl"><i class="ph-bold ph-plus"></i></button></div>
                <div v-for="(item, idx) in packingList" :key="idx" class="flex items-center gap-3 bg-white px-4 py-3 rounded-xl shadow-sm mb-2" :class="item.checked ? 'opacity-50' : ''"><button @click="togglePack(idx)" :class="item.checked ? 'text-green-500' : 'text-slate-200'"><i class="ph-fill ph-check-circle text-2xl"></i></button><span class="flex-1" :class="item.checked ? 'line-through' : ''">{{ item.name }}</span><button @click="delPack(idx)" class="text-red-200"><i class="ph-bold ph-trash text-lg"></i></button></div>
            </div>

            <div v-show="viewMode === 'map'" class="h-full relative">
                <div id="map" class="w-full h-full bg-slate-200"></div>
                <div class="absolute bottom-6 left-4 right-4 bg-white/90 p-4 rounded-2xl shadow-xl z-10 flex justify-between items-center border border-orange-100">
                    <span class="font-black text-slate-700">📍 地圖標記點</span>
                    <div class="flex gap-2">
                        <button @click="initMap" class="p-3 bg-teal-500 text-white rounded-full"><i class="ph-bold ph-arrows-clockwise text-xl"></i></button>
                        <button @click="locate" class="p-3 bg-blue-500 text-white rounded-full"><i class="ph-bold ph-crosshair text-xl"></i></button>
                    </div>
                </div>
            </div>

            <div v-if="viewMode === 'coupons'" class="p-4 pb-24">
                <div class="bg-amber-500 text-white rounded-3xl p-6 shadow-xl mb-6 relative overflow-hidden"><h2 class="text-2xl font-black">優惠券截圖</h2></div>
                <div class="handwritten-card p-6 mb-6 text-center border-2 border-dashed border-amber-200"><input type="file" id="coupon-upload" class="hidden" accept="image/*" @change="handleCouponUpload"><label for="coupon-upload" class="cursor-pointer flex flex-col items-center gap-2"><i class="ph-bold ph-cloud-arrow-up text-4xl text-amber-500"></i><span class="font-black text-amber-700 text-sm">新增優惠券截圖</span></label></div>
                <div v-for="(coupon, idx) in coupons" :key="idx" class="handwritten-card overflow-hidden mb-4"><img :src="coupon.image" class="w-full"><div class="p-3 flex justify-between"><input v-model="coupon.note" class="flex-1 border-none focus:ring-0" placeholder="備註..." @change="saveToCloud"><button @click="removeCoupon(idx)" class="text-red-200"><i class="ph-bold ph-trash text-lg"></i></button></div></div>
            </div>

            <div v-if="viewMode === 'money'" class="p-4 pb-24">
                <div class="bg-orange-500 text-white p-6 rounded-3xl shadow-xl mb-6 text-center relative overflow-hidden">
                    <div class="text-sm font-bold opacity-80 uppercase">Total (JPY)</div>
                    <div class="text-4xl font-black">¥ {{ totalExpense.toLocaleString() }}</div>
                </div>
                <div class="handwritten-card p-4 mb-4">
                    <input v-model="participantsStr" placeholder="成員 (我, 旅伴A)" class="w-full bg-slate-50 border-none rounded-xl mb-4" @change="saveToCloud">
                    <div class="flex flex-col gap-2"><input v-model="newExpense.item" placeholder="項目" class="bg-slate-50 border-none rounded-xl p-3"><input v-model.number="newExpense.amount" type="number" placeholder="金額" class="bg-slate-50 border-none rounded-xl p-3"><button @click="addExpense" class="bg-orange-500 text-white p-3 rounded-xl font-black">加入支出</button></div>
                </div>
                <div v-for="(exp, idx) in expenses" :key="idx" class="bg-white p-3 rounded-xl mb-2 flex justify-between"><span>{{ exp.item }}</span><span class="font-black text-orange-600">¥{{ exp.amount }}</span><button @click="removeExpense(idx)" class="text-red-200"><i class="ph-bold ph-trash"></i></button></div>
            </div>
        </main>

        <transition name="slide"><div v-if="showTripMenu" class="fixed inset-0 z-50 flex"><div class="bg-white w-4/5 max-w-xs h-full shadow-2xl flex flex-col p-6"><h2 class="text-xl font-bold mb-6">旅程列表</h2><button @click="createNewTrip" class="w-full py-3 mb-6 border-2 border-dashed border-orange-400 text-orange-600 rounded-xl font-bold">+ 建立新旅程</button><div class="flex-1 overflow-y-auto space-y-3"><div v-for="tripId in allTripIds" :key="tripId" @click="switchTrip(tripId)" class="p-4 rounded-xl border" :class="currentTripId === tripId ? 'bg-orange-50 border-orange-500' : 'border-transparent'">{{ tripId }}</div></div><button @click="showTripMenu = false" class="mt-auto text-slate-400">關閉選單</button></div><div class="flex-1 bg-black/50" @click="showTripMenu = false"></div></div></transition>

        <div v-if="showSetupModal" class="absolute inset-0 bg-orange-900/60 backdrop-blur-md z-50 flex items-center justify-center p-6"><div class="bg-white w-full max-w-sm rounded-[2rem] p-8 text-center shadow-2xl"><img src="https://cdn.phototourl.com/uploads/2026-02-27-c58164d7-98bb-4a27-aad2-0d7b756f4be4.jpg" class="w-20 mx-auto mb-4"><h2 class="text-2xl font-black mb-6">開啟新旅程伊呀薩薩！</h2><button @click="initFirstTrip" class="w-full bg-orange-500 text-white font-black py-4 rounded-2xl">建立雲端同步房間</button></div></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBjEYJPSMXhoprXnSVIWLW8Tx65-CjhEFs",
            authDomain: "anya-travel.firebaseapp.com",
            databaseURL: "https://anya-travel-default-rtdb.firebaseio.com",
            projectId: "anya-travel",
            storageBucket: "anya-travel.firebasestorage.app",
            messagingSenderId: "165020565046",
            appId: "1:165020565046:web:c2ae326e8ce267b02a6297",
            measurementId: "G-WC117BJ5Z2"
        };

        const { createApp, ref, computed, watch, onMounted, nextTick } = Vue;

        createApp({
            setup() {
                const viewMode = ref('plan'), currentDayIdx = ref(0), isSyncing = ref(false), showTripMenu = ref(false), showSetupModal = ref(false);
                const days = ref([]), setup = ref({ destination: '沖繩之旅', startDate: '', rate: 0.215 });
                const expenses = ref([]), participantsStr = ref('我, 旅伴A'), packingList = ref([]), newPackItem = ref(''), coupons = ref([]), allTripIds = ref([]), newExpense = ref({item:'', amount:0});
                
                if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                const db = firebase.database();

                const getTripId = () => new URLSearchParams(window.location.search).get('trip') || localStorage.getItem('last_shisa_trip');

                const saveToCloud = () => {
                    const id = getTripId(); if (!id) return;
                    isSyncing.value = true;
                    db.ref('trips/' + id).set({
                        days: JSON.parse(JSON.stringify(days.value)),
                        setup: JSON.parse(JSON.stringify(setup.value)),
                        expenses: JSON.parse(JSON.stringify(expenses.value)),
                        packingList: JSON.parse(JSON.stringify(packingList.value)),
                        coupons: JSON.parse(JSON.stringify(coupons.value)),
                        participantsStr: participantsStr.value,
                        updateAt: Date.now()
                    }).then(() => { setTimeout(() => isSyncing.value = false, 800); });
                };

                const listenCloud = (id) => {
                    if (!id) return (showSetupModal.value = true);
                    localStorage.setItem('last_shisa_trip', id);
                    db.ref('trips/' + id).on('value', (s) => {
                        const d = s.val();
                        if (d) {
                            days.value = d.days || []; setup.value = d.setup || setup.value;
                            expenses.value = d.expenses || []; packingList.value = d.packingList || [];
                            coupons.value = d.coupons || []; participantsStr.value = d.participantsStr || '我, 旅伴A';
                        }
                    });
                    db.ref('trips').limitToLast(10).once('value', (s) => { if(s.val()) allTripIds.value = Object.keys(s.val()).reverse(); });
                };

                const initFirstTrip = () => { const newId = 'trip_' + Math.random().toString(36).substr(2, 9); window.location.search = `?trip=${newId}`; };
                const createNewTrip = () => initFirstTrip();
                const switchTrip = (id) => { window.location.search = `?trip=${id}`; };
                const copyShareLink = () => { navigator.clipboard.writeText(window.location.href).then(() => alert("連結已複製！傳給旅伴即可同步。")); };

                const currentDay = computed(() => days.value[currentDayIdx.value] || {items:[]});
                const packProgress = computed(() => packingList.value.length ? (packingList.value.filter(i=>i.checked).length/packingList.value.length)*100 : 0);
                const totalExpense = computed(() => expenses.value.reduce((s, i) => s + (Number(i.amount) || 0), 0));

                const addItem = () => { currentDay.value.items.push({time:'10:00', type:'spot', activity:'', location:'', note:''}); saveToCloud(); };
                const removeItem = (i) => { currentDay.value.items.splice(i, 1); saveToCloud(); };
                const addDay = () => { days.value.push({date:'新增日期', shortDate:'D'+(days.value.length+1), items:[]}); saveToCloud(); };
                const addPack = () => { if(newPackItem.value){ packingList.value.unshift({name:newPackItem.value, checked:false}); newPackItem.value=''; saveToCloud(); } };
                const togglePack = (i) => { packingList.value[i].checked = !packingList.value[i].checked; saveToCloud(); };
                const delPack = (i) => { packingList.value.splice(i, 1); saveToCloud(); };
                const addExpense = () => { if(newExpense.value.item){ expenses.value.unshift({...newExpense.value}); newExpense.value={item:'', amount:0}; saveToCloud(); } };
                const removeExpense = (i) => { expenses.value.splice(i, 1); saveToCloud(); };
                const handleCouponUpload = (e) => { const r = new FileReader(); r.onload=(ev)=> { coupons.value.unshift({image:ev.target.result, note:''}); saveToCloud(); }; r.readAsDataURL(e.target.files[0]); };
                const removeCoupon = (i) => { coupons.value.splice(i, 1); saveToCloud(); };
                const getMapLink = (i) => `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(i.activity + ' ' + i.location)}`;
                const getIcon = (m) => ({plan:'ph-calendar-check', pack:'ph-suitcase-rolling', map:'ph-map-trifold', coupons:'ph-ticket', money:'ph-currency-dollar'}[m]);

                onMounted(() => listenCloud(getTripId()));

                let map = null;
                const initMap = async () => { await nextTick(); if(map) map.remove(); map = L.map('map', {zoomControl:false}).setView([26.2124, 127.6809], 11); L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map); };
                const locate = () => navigator.geolocation.getCurrentPosition(p => map?.flyTo([p.coords.latitude, p.coords.longitude], 15));
                watch(viewMode, (v) => { if(v === 'map') initMap(); });

                return { viewMode, currentDayIdx, days, currentDay, setup, isSyncing, showTripMenu, showSetupModal, allTripIds, copyShareLink, addItem, removeItem, addDay, addPack, togglePack, delPack, newPackItem, packProgress, addExpense, removeExpense, expenses, newExpense, totalExpense, handleCouponUpload, removeCoupon, coupons, getMapLink, getIcon, saveToCloud, initFirstTrip, createNewTrip, switchTrip, initMap, locate, participantsStr };
            }
        }).mount('#app')
    </script>
</body>
</html>
