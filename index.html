<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anya x Shisa 旅遊手帳 v24</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { --shisa-orange: #FFB74D; --shisa-deep-orange: #E65100; --shisa-brown: #5D4037; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f4f1ea; color: var(--shisa-brown); overflow-x: hidden; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .handwritten-card { background-color: white; border-radius: 2px 15px 5px 12px / 15px 5px 12px 2px !important; box-shadow: 2px 4px 12px rgba(0,0,0,0.08); border: 1px solid rgba(0,0,0,0.03); }
        .title-input { background: transparent; border: none; font-weight: 900; font-size: 1.25rem; width: 100%; color: var(--shisa-brown); padding: 0; outline: none; border-bottom: 2px dashed transparent; transition: 0.3s; }
        .title-input:focus { border-bottom-color: rgba(93, 64, 55, 0.3); }
        .sync-active { color: #10b981; animation: spin 2s infinite linear; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="h-screen flex flex-col">

    <div id="app" class="flex flex-col h-full max-w-md mx-auto w-full bg-[#fdfaf5] shadow-2xl relative sm:my-4 sm:h-[95vh] border-x border-orange-100 sm:rounded-3xl overflow-hidden">

        <header class="bg-[#FFB74D] text-[#5D4037] shrink-0 z-20 shadow-md">
            <div class="p-4 flex justify-between items-center gap-2">
                <button @click="showTripMenu = true"><i class="ph-bold ph-list text-2xl"></i></button>
                <div class="flex items-center gap-2 overflow-hidden flex-1">
                    <div class="w-10 h-10 rounded-full bg-white border-2 border-orange-400 p-0.5 overflow-hidden flex-shrink-0">
                        <img src="https://cdn.phototourl.com/uploads/2026-02-27-c58164d7-98bb-4a27-aad2-0d7b756f4be4.jpg" class="w-full h-full object-contain">
                    </div>
                    <div class="overflow-hidden flex-1">
                        <input v-model="setup.destination" class="title-input" @change="saveToCloud" placeholder="點擊命名旅程">
                        <p class="text-[10px] font-bold opacity-60 uppercase truncate">Happy Trip with Shisa!</p>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <i class="ph-bold ph-arrows-clockwise" :class="{'sync-active': isSyncing}"></i>
                    <button @click="copyShareLink" class="p-2 bg-white/20 rounded-lg"><i class="ph-bold ph-share-network text-lg"></i></button>
                </div>
            </div>
            
            <div class="flex items-center justify-around bg-white/20 p-2">
                <button v-for="m in ['plan', 'pack', 'map', 'coupons', 'money']" @click="viewMode = m" :class="viewMode === m ? 'bg-white text-orange-700 shadow-sm' : 'text-orange-900/50'" class="p-2 rounded-xl transition-all flex-1 mx-1 flex justify-center">
                    <i :class="getIcon(m)" class="text-xl"></i>
                </button>
            </div>

            <div v-if="viewMode === 'plan' || viewMode === 'map'" class="flex overflow-x-auto hide-scroll px-3 py-2 space-x-3 snap-x">
                <div v-for="(day, index) in days" :key="index" @click="currentDayIdx = index" class="snap-center shrink-0 flex flex-col items-center justify-center w-12 h-12 rounded-2xl cursor-pointer border-2 transition-all" :class="currentDayIdx === index ? 'bg-white text-[#E65100] border-white shadow-lg' : 'bg-white/30 text-orange-900/40 border-transparent'">
                    <span class="text-xs font-black">D{{ index + 1 }}</span>
                </div>
                <button @click="addDay" class="shrink-0 w-10 h-12 rounded-2xl border-2 border-dashed border-white/40 text-white/50"><i class="ph-bold ph-plus"></i></button>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto relative hide-scroll bg-[#fdfaf5]">
            <div v-if="viewMode === 'plan'" class="p-4 pb-24">
                <div class="handwritten-card p-4 mb-4 border-l-8 border-orange-400">
                    <h2 class="text-2xl font-black text-slate-800">{{ currentDay.date }}</h2>
                    <input v-model="currentDay.title" class="text-sm bg-transparent border-none w-full p-0 font-bold focus:ring-0" placeholder="今天的計畫是..." @change="saveToCloud">
                </div>
                
                <div class="mb-6" v-if="currentDay.flight">
                    <div class="relative bg-gradient-to-r from-blue-600 to-blue-400 rounded-2xl text-white shadow-lg p-4">
                        <button @click="toggleFlightCard" class="absolute top-2 right-2 opacity-50"><i class="ph-bold ph-x"></i></button>
                        <div class="flex justify-between items-center text-center">
                            <div class="flex-1"><input v-model="currentDay.flight.startTime" type="time" class="text-xl font-black bg-transparent border-none text-white w-full text-center" @change="saveToCloud"></div>
                            <div class="flex-1 px-1"><i class="ph-fill ph-airplane rotate-90 text-xl"></i><input v-model="currentDay.flight.number" class="text-[10px] bg-transparent border-none text-center w-full uppercase" @change="saveToCloud"></div>
                            <div class="flex-1"><input v-model="currentDay.flight.endTime" type="time" class="text-xl font-black bg-transparent border-none text-white w-full text-center" @change="saveToCloud"></div>
                        </div>
                    </div>
                </div>
                <button v-else @click="toggleFlightCard" class="w-full py-3 mb-4 border-2 border-dashed border-orange-200 rounded-2xl text-orange-300 flex items-center justify-center gap-2"><i class="ph-bold ph-airplane-tilt"></i> 新增當日航班</button>

                <div class="relative pl-4 border-l-2 border-orange-200 space-y-6">
                    <div v-for="(item, idx) in currentDay.items" :key="idx" class="handwritten-card p-4">
                        <div class="flex gap-4 items-start">
                            <div class="flex flex-col gap-2 shrink-0">
                                <input v-model="item.time" type="time" class="font-bold text-orange-700 bg-orange-50 rounded-lg p-1 text-xs border-none" @change="saveToCloud">
                                <select v-model="item.type" class="text-[11px] font-bold text-orange-600 bg-orange-50 border-none rounded-lg py-1 px-2" @change="saveToCloud">
                                    <option value="spot">📍 景點</option><option value="food">🍴 美食</option><option value="hotel">🏨 住宿</option>
                                </select>
                            </div>
                            <div class="flex-1 min-w-0">
                                <input v-model="item.activity" class="font-black text-slate-700 bg-transparent border-none p-0 w-full text-lg focus:ring-0" placeholder="目的名稱" @change="saveToCloud">
                                <input v-model="item.location" class="text-[10px] text-slate-400 bg-transparent border-none p-0 w-full mt-1 focus:ring-0" placeholder="地址或店名" @change="saveToCloud">
                                <input v-model="item.note" class="text-[10px] text-orange-800/60 bg-orange-50/50 rounded p-1 w-full mt-2 border-none" placeholder="備註: MapCode/必吃" @change="saveToCloud">
                            </div>
                            <div class="flex flex-col gap-3 shrink-0">
                                <a :href="getMapLink(item)" target="_blank" class="text-teal-500"><i class="ph-bold ph-paper-plane-tilt text-2xl"></i></a>
                                <button @click="removeItem(idx)" class="text-red-200"><i class="ph-bold ph-trash text-xl"></i></button>
                            </div>
                        </div>
                    </div>
                    <button @click="addItem" class="text-orange-500 font-bold text-sm">+ 加入行程項目</button>
                </div>
            </div>

            <div v-if="viewMode === 'pack'" class="p-4 pb-24 text-sm">
                <div class="bg-indigo-600 text-white rounded-3xl p-6 shadow-xl mb-4 relative overflow-hidden">
                    <h2 class="text-2xl font-black">行李清單</h2>
                    <div class="mt-4 bg-white/20 rounded-full h-2"><div class="bg-white h-full" :style="{ width: packProgress + '%' }"></div></div>
                </div>
                <div class="handwritten-card p-4 flex gap-2 mb-4"><input v-model="newPackItem" @keyup.enter="addPack" placeholder="需要帶什麼？" class="flex-1 border-none bg-slate-50 rounded-xl px-4 py-3"><button @click="addPack" class="bg-indigo-500 text-white px-4 rounded-xl shadow-md"><i class="ph-bold ph-plus"></i></button></div>
                <div v-for="(item, idx) in packingList" :key="idx" class="flex items-center gap-3 bg-white px-4 py-3 rounded-xl shadow-sm mb-2" :class="item.checked ? 'opacity-50' : ''"><button @click="togglePack(idx)" :class="item.checked ? 'text-green-500' : 'text-slate-200'"><i class="ph-fill ph-check-circle text-2xl"></i></button><span class="flex-1" :class="item.checked ? 'line-through' : ''">{{ item.name }}</span><button @click="delPack(idx)" class="text-red-200"><i class="ph-bold ph-trash text-lg"></i></button></div>
            </div>

            <div v-show="viewMode === 'map'" class="h-full relative">
                <div id="map" class="w-full h-full bg-slate-200"></div>
                <div class="absolute bottom-6 left-4 right-4 bg-white/90 p-4 rounded-2xl shadow-xl z-10 flex justify-between items-center border border-orange-100">
                    <span class="font-black text-slate-700">📍 {{ currentDay.items?.length || 0 }} 個地點標記</span>
                    <div class="flex gap-2">
                        <button @click="initMap" class="p-3 bg-teal-500 text-white rounded-full"><i class="ph-bold ph-arrows-clockwise text-xl"></i></button>
                        <button @click="locate" class="p-3 bg-blue-500 text-white rounded-full"><i class="ph-bold ph-crosshair text-xl"></i></button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // --- 直接幫你填好截圖中的金鑰 ---
        const firebaseConfig = {
            apiKey: "AIzaSyBjEYJPSMXhoprXnSVIWLW8Tx65-CjhEFs",
            authDomain: "anya-travel.firebaseapp.com",
            databaseURL: "https://anya-travel-default-rtdb.firebaseio.com",
            projectId: "anya-travel",
            storageBucket: "anya-travel.firebasestorage.app",
            messagingSenderId: "165020565046",
            appId: "1:165020565046:web:c2ae326e8ce267b02a6297",
            measurementId: "G-WC117BJ5Z2"
        };
        // -------------------------------------

        const { createApp, ref, computed, watch, onMounted, nextTick } = Vue;

        createApp({
            setup() {
                const viewMode = ref('plan'), currentDayIdx = ref(0), isSyncing = ref(false), showTripMenu = ref(false);
                const days = ref([]), setup = ref({ destination: '沖繩之旅', startDate: '2026-02-27', rate: 0.215 });
                const expenses = ref([]), participantsStr = ref('我, 旅伴A'), packingList = ref([]), newPackItem = ref('');

                if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                const db = firebase.database();

                const getTripId = () => {
                    const params = new URLSearchParams(window.location.search);
                    return params.get('trip') || 'default_trip';
                };

                const saveToCloud = () => {
                    const id = getTripId();
                    isSyncing.value = true;
                    db.ref('trips/' + id).set({
                        days: JSON.parse(JSON.stringify(days.value)),
                        setup: JSON.parse(JSON.stringify(setup.value)),
                        expenses: JSON.parse(JSON.stringify(expenses.value)),
                        packingList: JSON.parse(JSON.stringify(packingList.value)),
                        participantsStr: participantsStr.value,
                        updateAt: Date.now()
                    }).then(() => { setTimeout(() => isSyncing.value = false, 800); });
                };

                const listenCloud = (id) => {
                    db.ref('trips/' + id).on('value', (s) => {
                        const d = s.val();
                        if (d) {
                            days.value = d.days || [];
                            setup.value = d.setup || setup.value;
                            expenses.value = d.expenses || [];
                            packingList.value = d.packingList || [];
                            participantsStr.value = d.participantsStr || '我, 旅伴A';
                        } else if (id === 'default_trip' && days.value.length === 0) {
                            initNewTrip();
                        }
                    });
                };

                const initNewTrip = () => {
                    days.value = Array.from({length: 5}, (_, i) => ({
                        date: `${2+i}/27`, shortDate: `2/27`, items: [], flight: null
                    }));
                    saveToCloud();
                };

                const copyShareLink = () => {
                    const link = `${window.location.origin}${window.location.pathname}?trip=${getTripId()}`;
                    navigator.clipboard.writeText(link);
                    alert("同步連結已複製！傳給旅伴打開即可。");
                };

                const currentDay = computed(() => days.value[currentDayIdx.value] || {items:[]});
                const packProgress = computed(() => packingList.value.length ? (packingList.value.filter(i=>i.checked).length/packingList.value.length)*100 : 0);

                const addItem = () => { currentDay.value.items.push({time:'10:00', type:'spot', activity:'', location:'', note:''}); saveToCloud(); };
                const removeItem = (i) => { currentDay.value.items.splice(i, 1); saveToCloud(); };
                const toggleFlightCard = () => { if(currentDay.value.flight) currentDay.value.flight = null; else currentDay.value.flight = {startTime:'11:00', endTime:'14:00', number:'BR198'}; saveToCloud(); };
                const addPack = () => { if(newPackItem.value){ packingList.value.unshift({name:newPackItem.value, checked:false}); newPackItem.value=''; saveToCloud(); } };
                const togglePack = (i) => { packingList.value[i].checked = !packingList.value[i].checked; saveToCloud(); };
                const delPack = (i) => { packingList.value.splice(i, 1); saveToCloud(); };
                const getIcon = (m) => ({plan:'ph-calendar-check', pack:'ph-suitcase-rolling', map:'ph-map-trifold', coupons:'ph-ticket', money:'ph-currency-dollar'}[m]);
                const getMapLink = (item) => `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(item.activity + ' ' + item.location)}`;

                onMounted(() => listenCloud(getTripId()));

                let map = null;
                const initMap = async () => { await nextTick(); if(map) map.remove(); map = L.map('map', {zoomControl:false}).setView([26.2124, 127.6809], 11); L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map); };
                const locate = () => navigator.geolocation.getCurrentPosition(p => map?.flyTo([p.coords.latitude, p.coords.longitude], 15));
                watch(viewMode, (v) => { if(v === 'map') initMap(); });

                return { viewMode, currentDayIdx, days, currentDay, setup, isSyncing, copyShareLink, addItem, removeItem, toggleFlightCard, addPack, togglePack, delPack, newPackItem, packProgress, initMap, locate, getIcon, getMapLink, saveToCloud };
            }
        }).mount('#app')
    </script>
</body>
</html>
