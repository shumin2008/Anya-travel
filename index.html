<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026OKINAWA</title>
    
<link rel="apple-touch-icon" href="https://cdn.phototourl.com/uploads/2026-02-27-dbb392e6-6884-4b06-980b-2719bb6c5aa5.png">
<link rel="icon" type="image/png" href="https://cdn.phototourl.com/uploads/2026-02-27-dbb392e6-6884-4b06-980b-2719bb6c5aa5.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#FFB74D">

    <meta property="og:title" content="2026OKINAWA">
    <meta property="og:description" content="專屬的沖繩旅遊計畫，包含每日行程、行李清單與備忘錄。">
    <meta property="og:image" content="https://cdn.phototourl.com/uploads/2026-02-27-c58164d7-98bb-4a27-aad2-0d7b756f4be4.jpg">

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vuedraggable/4.1.0/vuedraggable.umd.min.js"></script>

    <style>
        :root { --shisa-orange: #FFB74D; --shisa-deep-orange: #E65100; --shisa-brown: #5D4037; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f4f1ea; color: var(--shisa-brown); -webkit-tap-highlight-color: transparent; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        .handwritten-card { background-color: white; border-radius: 2px 15px 5px 12px / 15px 5px 12px 2px !important; box-shadow: 2px 4px 12px rgba(0,0,0,0.08); border: 1px solid rgba(0,0,0,0.03); }
        .title-input { background: transparent; border: none; font-weight: 900; font-size: 1.25rem; width: 100%; color: var(--shisa-brown); padding: 0; margin: 0; }
        .title-input:focus { outline: none; border-bottom: 2px dashed rgba(93, 64, 55, 0.3); }
        .memo-textarea { width: 100%; min-height: 450px; border: none; resize: none; background: transparent; line-height: 2; font-size: 15px; color: #4A5568; }
        .memo-paper { background-image: radial-gradient(#e5e7eb 1px, transparent 1px); background-size: 24px 24px; }
        .drag-handle { cursor: grab; }
        .drag-handle:active { cursor: grabbing; }
        .ghost-card { opacity: 0.3; background: #FFF3E0; border: 2px dashed #FFB74D; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <div id="app" class="flex flex-col h-full max-w-md mx-auto w-full bg-[#fdfaf5] shadow-2xl relative sm:rounded-3xl sm:my-4 sm:h-[95vh] border-x border-orange-100">

        <header class="bg-[#FFB74D] text-[#5D4037] shrink-0 z-20 shadow-md">
            <div class="p-4 flex justify-between items-center">
                <div class="flex items-center gap-3 flex-1 overflow-hidden">
                    <div class="flex items-center gap-2 overflow-hidden flex-1">
                        <div class="w-12 h-12 rounded-full bg-white border-2 border-orange-400 p-0.5 shadow-sm overflow-hidden flex-shrink-0 flex items-center justify-center">
                            <img :src="shisaLogo" alt="獅薩" class="w-full h-full object-contain">
                        </div>
                        <div class="overflow-hidden flex-1">
                            <input v-model="setup.destination" class="title-input" placeholder="旅程名稱" @change="syncTripName">
                            <p class="text-[10px] font-bold opacity-60 uppercase truncate">Happy Trip with Shisa!</p>
                        </div>
                    </div>
                </div>
                
                <div class="flex items-center gap-1 bg-white/30 p-1 rounded-xl shrink-0 ml-2">
                    <button @click="viewMode = 'plan'" :class="viewMode === 'plan' ? 'bg-white text-orange-700' : 'text-orange-900/50'" class="p-2 rounded-lg transition-all"><i class="ph-bold ph-calendar-check text-lg"></i></button>
                    <button @click="viewMode = 'pack'" :class="viewMode === 'pack' ? 'bg-white text-orange-700' : 'text-orange-900/50'" class="p-2 rounded-lg transition-all"><i class="ph-bold ph-suitcase-rolling text-lg"></i></button>
                    <button @click="viewMode = 'memo'" :class="viewMode === 'memo' ? 'bg-white text-orange-700' : 'text-orange-900/50'" class="p-2 rounded-lg transition-all"><i class="ph-bold ph-note-pencil text-lg"></i></button>
                    <button @click="viewMode = 'coupons'" :class="viewMode === 'coupons' ? 'bg-white text-orange-700' : 'text-orange-900/50'" class="p-2 rounded-lg transition-all"><i class="ph-bold ph-ticket text-lg"></i></button>
                    <button @click="viewMode = 'money'" :class="viewMode === 'money' ? 'bg-white text-orange-700' : 'text-orange-900/50'" class="p-2 rounded-lg transition-all"><i class="ph-bold ph-currency-dollar text-lg"></i></button>
                </div>
            </div>
            
            <div v-if="viewMode === 'plan'" class="flex overflow-x-auto hide-scroll px-3 pb-3 space-x-3 snap-x">
                <div v-for="(day, index) in days" :key="index" @click="currentDayIdx = index" 
                     class="snap-center shrink-0 flex flex-col items-center justify-center w-14 h-16 rounded-2xl cursor-pointer border-2 transition-all" 
                     :class="currentDayIdx === index ? 'bg-white text-[#E65100] border-white shadow-lg scale-105' : 'bg-white/30 text-orange-900/40 border-transparent'">
                    <span class="text-[9px] font-bold">{{ day.shortDate }}</span>
                    <span class="text-lg font-black">D{{ index + 1 }}</span>
                </div>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto relative hide-scroll bg-[#fdfaf5]">
            <div v-if="viewMode === 'plan'" class="p-4 pb-24">
                <div class="handwritten-card p-4 mb-4 border-l-8 border-orange-400">
                    <h2 class="text-2xl font-black text-slate-800">{{ currentDay.date }}</h2>
                    <input v-model="currentDay.title" class="text-sm text-slate-400 bg-transparent border-none w-full p-0 focus:ring-0 font-bold" placeholder="今天的計畫是...">
                </div>

                <div class="mb-6">
                    <div v-if="currentDay.flight" class="relative bg-gradient-to-r from-blue-600 to-blue-400 rounded-2xl text-white shadow-lg p-4">
                        <button @click="currentDay.flight = null" class="absolute top-2 right-2 opacity-50"><i class="ph-bold ph-x"></i></button>
                        <div class="flex justify-between items-center text-center">
                            <div class="flex-1">
                                <input v-model="currentDay.flight.startTime" type="time" class="text-2xl font-black bg-transparent border-none text-white w-full text-center p-0 font-mono focus:ring-0">
                                <div class="text-[9px] opacity-60">DEPART</div>
                            </div>
                            <div class="flex-1 px-1">
                                <i class="ph-fill ph-airplane rotate-90 text-xl"></i>
                                <input v-model="currentDay.flight.number" class="text-[10px] font-mono border-t border-white/30 mt-1 uppercase bg-transparent border-none text-white w-full text-center p-0 focus:ring-0" placeholder="編號">
                            </div>
                            <div class="flex-1">
                                <input v-model="currentDay.flight.endTime" type="time" class="text-2xl font-black bg-transparent border-none text-white w-full text-center p-0 font-mono focus:ring-0">
                                <div class="text-[9px] opacity-60">ARRIVE</div>
                            </div>
                        </div>
                    </div>
                    <button v-else @click="addFlight" class="w-full py-3 border-2 border-dashed border-orange-200 rounded-2xl text-orange-300 flex items-center justify-center gap-2 font-bold"><i class="ph-bold ph-airplane-tilt"></i> 新增當日航班</button>
                </div>

                <div class="relative pl-4 border-l-2 border-orange-200">
                    <draggable 
                        v-model="currentDay.items" 
                        handle=".drag-handle"
                        item-key="id"
                        ghost-class="ghost-card"
                        class="space-y-6"
                    >
                        <template #item="{element, index}">
                            <div class="handwritten-card p-4 group relative">
                                <div class="flex gap-4 items-start">
                                    <div class="drag-handle absolute -left-7 top-1/2 -translate-y-1/2 text-orange-300">
                                        <i class="ph-bold ph-dots-six-vertical text-xl"></i>
                                    </div>

                                    <div class="flex flex-col gap-2 w-24 shrink-0">
                                        <input v-model="element.time" type="time" class="font-bold text-orange-700 bg-orange-50 rounded-lg p-1 text-sm border-none w-full text-center focus:ring-0">
                                        <select v-model="element.type" class="text-[11px] font-bold text-orange-600 bg-orange-50 border-none rounded-lg py-1 px-2 w-full focus:ring-0">
                                            <option value="spot">📍 景點</option>
                                            <option value="food">🍴 美食</option>
                                            <option value="hotel">🏨 住宿</option>
                                        </select>
                                    </div>
                                    <div class="flex-1 min-w-0">
                                        <input v-model="element.activity" class="font-black text-slate-700 bg-transparent border-none p-0 w-full text-lg focus:ring-0" placeholder="目的地名稱">
                                        <input v-model="element.location" class="text-[10px] text-slate-400 bg-transparent border-none p-0 w-full mt-1 focus:ring-0" placeholder="地址/MapCode">
                                        <input v-model="element.note" class="text-[10px] text-orange-800/60 bg-orange-50/50 rounded p-1 w-full mt-2 focus:ring-0 border-none" placeholder="備註或連結...">
                                    </div>
                                    <div class="flex flex-col gap-3 shrink-0 items-center justify-between h-full">
                                        <a :href="'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(element.activity + ' ' + element.location)" 
                                           target="_blank" 
                                           class="text-teal-500 hover:text-teal-700">
                                            <i class="ph-bold ph-paper-plane-tilt text-2xl"></i>
                                        </a>
                                        <button @click="removeItem(index)" class="text-red-200 hover:text-red-500"><i class="ph-bold ph-trash text-xl"></i></button>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </draggable>
                    <button @click="addItem" class="text-orange-500 font-bold text-sm flex items-center gap-1 mt-6"><i class="ph-bold ph-plus-circle text-lg"></i> 加入行程項目</button>
                </div>
            </div>

            <div v-if="viewMode === 'memo'" class="p-4 pb-24 h-full">
                <div class="bg-teal-600 text-white rounded-3xl p-6 shadow-xl mb-6 relative overflow-hidden uppercase tracking-widest">
                    <i class="ph-fill ph-note absolute -right-4 -bottom-4 text-9xl opacity-10"></i>
                    <h2 class="text-2xl font-black relative z-10">旅程備忘錄</h2>
                    <p class="text-xs opacity-70 mt-1 font-bold">在此貼上網址、重要代碼或隨手紀錄</p>
                </div>
                <div class="handwritten-card p-6 min-h-[450px] memo-paper">
                    <textarea v-model="memoText" class="memo-textarea" placeholder="例如：租車連結、預約序號..."></textarea>
                </div>
            </div>

            <div v-if="viewMode === 'pack'" class="p-4 pb-24 text-sm">
                <div class="bg-indigo-600 text-white rounded-3xl p-6 shadow-xl mb-6 relative overflow-hidden uppercase tracking-widest">
                    <i class="ph-fill ph-suitcase-rolling absolute -right-4 -bottom-4 text-9xl opacity-10"></i>
                    <h2 class="text-2xl font-black relative z-10">行李清單</h2>
                    <div class="mt-4 bg-white/20 rounded-full h-2 relative z-10"><div class="bg-white h-full" :style="{ width: packingProgress + '%' }"></div></div>
                </div>
                <div class="handwritten-card p-4 mb-4 flex gap-2"><input v-model="newItemName" @keyup.enter="addPackItem" placeholder="需要帶什麼？" class="flex-1 bg-slate-50 border-none rounded-xl px-4 py-3"><button @click="addPackItem" class="bg-indigo-500 text-white px-4 rounded-xl shadow-md"><i class="ph-bold ph-plus"></i></button></div>
                <div class="space-y-2"><div v-for="(item, idx) in packingList" :key="idx" class="flex items-center gap-3 bg-white px-4 py-3 rounded-xl shadow-sm" :class="item.checked ? 'opacity-50' : ''"><button @click="item.checked = !item.checked" :class="item.checked ? 'text-green-500' : 'text-slate-200'"><i class="ph-fill ph-check-circle text-2xl"></i></button><span class="flex-1 font-bold text-slate-700" :class="item.checked ? 'line-through' : ''">{{ item.name }}</span><button @click="removePackItem(idx)" class="text-slate-200 hover:text-red-400"><i class="ph-bold ph-trash text-lg"></i></button></div></div>
            </div>

            <div v-if="viewMode === 'coupons'" class="p-4 pb-24 text-sm text-center">
                <div class="bg-amber-500 text-white rounded-3xl p-6 shadow-xl mb-6 relative overflow-hidden"><i class="ph-fill ph-ticket absolute -right-4 -bottom-4 text-9xl opacity-10"></i><h2 class="text-2xl font-black relative z-10">優惠券</h2></div>
                <div class="handwritten-card p-6 mb-6 border-2 border-dashed border-amber-200"><input type="file" id="coupon-upload" class="hidden" accept="image/*" @change="handleCouponUpload"><label for="coupon-upload" class="cursor-pointer flex flex-col items-center gap-2"><i class="ph-bold ph-cloud-arrow-up text-4xl text-amber-500"></i><span class="font-black text-amber-700 text-sm">上傳截圖</span></label></div>
                <div class="grid grid-cols-1 gap-4"><div v-for="(coupon, idx) in coupons" :key="idx" class="handwritten-card overflow-hidden"><img :src="coupon.image" class="w-full h-auto object-cover"><div class="p-3 flex justify-between bg-amber-50/30"><input v-model="coupon.note" class="flex-1 bg-transparent border-none p-0 text-sm font-bold text-amber-900 focus:ring-0 text-left" placeholder="備註..."><button @click="removeCoupon(idx)" class="text-red-200 hover:text-red-500"><i class="ph-bold ph-trash-simple text-lg"></i></button></div></div></div>
            </div>

            <div v-if="viewMode === 'money'" class="p-4 pb-24 text-sm">
                <div class="bg-orange-500 text-white p-6 rounded-3xl shadow-xl mb-6 text-center">
                    <div class="text-4xl font-black font-mono">¥ {{ totalExpense.toLocaleString() }}</div>
                    <div class="text-lg font-bold text-orange-100 mt-1">≈ NT$ {{ Math.round(totalExpense * setup.rate).toLocaleString() }}</div>
                </div>
                <div class="text-center text-slate-400 italic font-bold">記錄你的每一筆開支...</div>
            </div>
        </main>

        <div v-if="showSetupModal" class="absolute inset-0 bg-orange-900/60 backdrop-blur-md z-50 flex items-center justify-center p-6">
            <div class="bg-white w-full max-w-sm rounded-[2rem] p-8 text-center shadow-2xl">
                <img :src="shisaLogo" class="w-20 mx-auto mb-4">
                <h2 class="text-2xl font-black text-slate-800 mb-6 uppercase tracking-tighter">開啟新旅程吧！</h2>
                <input v-model="setup.destination" placeholder="目的地名稱" class="w-full bg-slate-50 border-none rounded-2xl px-4 py-3 font-bold mb-4">
                <div class="grid grid-cols-2 gap-2 mb-4">
                    <input v-model="setup.startDate" type="date" class="w-full bg-slate-50 border-none rounded-2xl px-4 py-3 text-xs">
                    <input v-model.number="setup.days" type="number" placeholder="天數" class="w-full bg-slate-50 border-none rounded-2xl px-4 py-3 text-center font-bold">
                </div>
                <button @click="initTrip" class="w-full bg-orange-500 text-white font-black py-4 rounded-2xl shadow-lg active:scale-95 transition">Start Journey!</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref as dbRef, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBjeYJPSMXhoprXnSVIWLW8Tx65-CjhEFs",
            authDomain: "anya-travel.firebaseapp.com",
            databaseURL: "https://anya-travel-default-rtdb.firebaseio.com",
            projectId: "anya-travel",
            storageBucket: "anya-travel.firebasestorage.app",
            messagingSenderId: "165020565046",
            appId: "1:165020565046:web:c2ae326e8ce267b02a6297",
            measurementId: "G-WC117BJ5Z2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const { createApp, ref, computed, watch, onMounted } = Vue;

        createApp({
            components: { 'draggable': window.vuedraggable },
            setup() {
                const shisaLogo = ref("https://cdn.phototourl.com/uploads/2026-02-27-c58164d7-98bb-4a27-aad2-0d7b756f4be4.jpg");
                const viewMode = ref('plan'), currentDayIdx = ref(0), showSetupModal = ref(false), tripList = ref([]), currentTripId = ref(null);
                const days = ref([]), setup = ref({ destination: '', startDate: '', days: 5, rate: 0.215 }), expenses = ref([]), participantsStr = ref('我, 旅伴A'), newItemName = ref(''), packingList = ref([]), coupons = ref([]), newExpense = ref({ item: '', amount: '', payer: '', date: '', currency: 'JPY' });
                const memoText = ref('');

                // 修復：確保 currentDay 始終指向正確的對象
                const currentDay = computed(() => {
                    if (days.value.length > 0 && days.value[currentDayIdx.value]) {
                        return days.value[currentDayIdx.value];
                    }
                    return { items: [], flight: null, date: '', title: '' };
                });

                // 修復：正確的新增行程邏輯 (對應目前選擇的日期)
                const addItem = () => {
                    if (!currentDay.value.items) currentDay.value.items = [];
                    currentDay.value.items.push({ 
                        id: Date.now().toString(),
                        time: '10:00', 
                        type: 'spot', 
                        activity: '', 
                        location: '', 
                        note: '' 
                    });
                };
                
                const removeItem = (idx) => currentDay.value.items.splice(idx, 1);
                
                const addFlight = () => {
                    currentDay.value.flight = { startTime: '10:00', number: 'BR198', endTime: '12:30' };
                };

                // Firebase 儲存與同步
                const saveCurrentTripData = () => {
                    if (!currentTripId.value) return;
                    set(dbRef(db, 'trips/' + currentTripId.value), {
                        days: JSON.parse(JSON.stringify(days.value)),
                        expenses: JSON.parse(JSON.stringify(expenses.value)),
                        setup: JSON.parse(JSON.stringify(setup.value)),
                        packingList: JSON.parse(JSON.stringify(packingList.value)),
                        coupons: JSON.parse(JSON.stringify(coupons.value)),
                        participantsStr: participantsStr.value,
                        memoText: memoText.value
                    });
                };

                const switchTrip = (id) => {
                    currentTripId.value = id;
                    onValue(dbRef(db, 'trips/' + id), (snapshot) => {
                        const data = snapshot.val();
                        if (data) {
                            days.value = data.days || [];
                            expenses.value = data.expenses || [];
                            setup.value = data.setup || {};
                            packingList.value = data.packingList || [];
                            coupons.value = data.coupons || [];
                            participantsStr.value = data.participantsStr || '我, 旅伴A';
                            memoText.value = data.memoText || '';
                        }
                    });
                };

                const initTrip = () => {
                    if(!setup.value.destination) return alert('請輸入目的地');
                    const newId = 'shisa_' + Date.now().toString(36), start = new Date(setup.value.startDate);
                    const newDays = Array.from({length: setup.value.days}, (_, i) => { 
                        const d = new Date(start); 
                        d.setDate(start.getDate() + i); 
                        return { 
                            date: `${d.getMonth()+1}/${d.getDate()} (${['日','一','二','三','四','五','六'][d.getDay()]})`, 
                            shortDate: `${d.getMonth()+1}/${d.getDate()}`, 
                            fullDate: d.toISOString().split('T')[0], 
                            items: [], 
                            flight: null 
                        }; 
                    });
                    tripList.value = [{ id: newId, destination: setup.value.destination }];
                    set(dbRef(db, 'shisa_trip_index'), tripList.value);
                    currentTripId.value = newId; days.value = newDays; showSetupModal.value = false;
                };

                onMounted(() => {
                    onValue(dbRef(db, 'shisa_trip_index'), (snapshot) => {
                        const index = snapshot.val();
                        if (index && index.length > 0) {
                            tripList.value = index;
                            if (!currentTripId.value) switchTrip(tripList.value[0].id);
                        } else {
                            showSetupModal.value = true;
                        }
                    });
                });

                watch([days, expenses, packingList, setup, coupons, memoText], () => saveCurrentTripData(), { deep: true });

                const totalExpense = computed(() => 0); // 簡化
                const packingProgress = computed(() => 0); // 簡化

                return { 
                    shisaLogo, viewMode, currentDayIdx, days, currentDay, addItem, removeItem, addFlight,
                    setup, showSetupModal, initTrip, memoText, packingProgress, totalExpense,
                    newItemName, packingList, coupons, participantsStr
                };
            }
        }).mount('#app')
    </script>
</body>
</html>
