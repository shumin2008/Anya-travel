<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics.js";
import { getDatabase, ref as dbRef, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

const { createApp, ref, computed, watch, onMounted, nextTick, onBeforeUnmount } = Vue;

const firebaseConfig = {
  apiKey: "AIzaSyBjeYJPSMXhoprXnSVIWLW8Tx65-CjhEFs",
  authDomain: "anya-travel.firebaseapp.com",
  databaseURL: "https://anya-travel-default-rtdb.firebaseio.com",
  projectId: "anya-travel",
  storageBucket: "anya-travel.firebasestorage.app",
  messagingSenderId: "165020565046",
  appId: "1:165020565046:web:c2ae326e8ce267b02a6297",
  measurementId: "G-WC117BJ5Z2"
};

// Initialize Firebase
const fbApp = initializeApp(firebaseConfig);

// ✅ 避免 analytics 在某些環境直接 throw 造成整頁空白
let analytics = null;
try {
  analytics = getAnalytics(fbApp);
} catch (err) {
  console.warn("Firebase Analytics unavailable:", err);
}

const db = getDatabase(fbApp);

createApp({
  setup() {
    const DEFAULT_LOGO = "https://cdn.phototourl.com/uploads/2026-02-27-c58164d7-98bb-4a27-aad2-0d7b756f4be4.jpg";

    const shisaLogo = ref(DEFAULT_LOGO);

    // --- 圖片壓縮 ---
    // 頭像：中央裁切成正方形 + 壓縮
    const compressImageSquare = (file, maxSize = 200, quality = 0.7) => {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement("canvas");
            const w = img.width, h = img.height;

            const size = Math.min(w, h);
            const sx = (w - size) / 2;
            const sy = (h - size) / 2;

            const d = size > maxSize ? maxSize : size;
            canvas.width = d;
            canvas.height = d;

            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, sx, sy, size, size, 0, 0, d, d);

            resolve(canvas.toDataURL("image/jpeg", quality));
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    };

    // 優惠券：保留原比例縮放（不裁切）+ 壓縮
    const compressImageKeepRatio = (file, maxWidth = 1200, quality = 0.75) => {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const scale = Math.min(1, maxWidth / img.width);
            const w = Math.round(img.width * scale);
            const h = Math.round(img.height * scale);

            const canvas = document.createElement("canvas");
            canvas.width = w;
            canvas.height = h;

            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, w, h);

            resolve(canvas.toDataURL("image/jpeg", quality));
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    };

    // --- 原有 state ---
    const viewMode = ref("plan");
    const currentDayIdx = ref(0);
    const showSetupModal = ref(false);
    const showTripMenu = ref(false);
    const tripList = ref([]);
    const currentTripId = ref(null);

    const days = ref([]);
    const setup = ref({ destination: "沖繩 Okinawa", startDate: "2026-04-25", days: 7, rate: 0.215 });
    const expenses = ref([]);
    const participantsStr = ref("我, 旅伴A");
    const newItemName = ref("");
    const packingList = ref([]);
    const coupons = ref([]);
    const newExpense = ref({
      item: "",
      amount: "",
      payer: "",
      date: new Date().toISOString().split("T")[0],
      currency: "JPY"
    });

    const currentDay = computed(() => days.value[currentDayIdx.value] || { items: [], flight: null });
    const participants = computed(() => participantsStr.value.split(",").map((s) => s.trim()).filter((s) => s));

    // ✅ rate 防呆（避免 0/空值造成 NaN / Infinity）
    const safeRate = computed(() => {
      const r = Number(setup.value.rate);
      return Number.isFinite(r) && r > 0 ? r : 0.215;
    });

    const totalExpense = computed(() =>
      expenses.value.reduce((sum, item) => {
        const amt = Number(item.amount) || 0;
        return item.currency === "TWD" ? sum + amt / safeRate.value : sum + amt;
      }, 0)
    );

    const packingProgress = computed(() =>
      packingList.value.length ? (packingList.value.filter((i) => i.checked).length / packingList.value.length) * 100 : 0
    );

    const paidByPerson = computed(() => {
      const map = {};
      participants.value.forEach((p) => (map[p] = 0));
      expenses.value.forEach((e) => {
        if (map[e.payer] === undefined) return;
        const amt = Number(e.amount) || 0;
        map[e.payer] += e.currency === "TWD" ? amt / safeRate.value : amt;
      });
      return map;
    });

    // --- 行程 ---
    const getGoogleMapLink = (activity, loc) => {
      const query = [activity, loc].filter(Boolean).join(" ");
      return query ? `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(query)}` : "#";
    };
    const addItem = () => currentDay.value.items.push({ time: "10:00", type: "spot", activity: "", location: "", note: "" });
    const removeItem = (idx) => currentDay.value.items.splice(idx, 1);

    const addDay = () => {
      const last = days.value[days.value.length - 1];
      if (!last?.fullDate) return;
      const lastDay = new Date(last.fullDate);
      lastDay.setDate(lastDay.getDate() + 1);
      const mm = lastDay.getMonth() + 1,
        dd = lastDay.getDate();
      days.value.push({
        date: `${mm}/${dd} (${["日", "一", "二", "三", "四", "五", "六"][lastDay.getDay()]})`,
        shortDate: `${mm}/${dd}`,
        fullDate: lastDay.toISOString().split("T")[0],
        items: [],
        flight: null
      });
    };

    const toggleFlightCard = () => {
      if (currentDay.value.flight) currentDay.value.flight = null;
      else currentDay.value.flight = { startTime: "11:16", startAirport: "TPE", number: "BR198", endTime: "14:00", endAirport: "OKA" };
    };

    // --- 行李 ---
    const addPackItem = () => {
      if (newItemName.value.trim()) {
        packingList.value.unshift({ name: newItemName.value, checked: false });
        newItemName.value = "";
      }
    };
    const removePackItem = (idx) => packingList.value.splice(idx, 1);

    // --- 支出 ---
    const addExpense = () => {
      if (newExpense.value.item && newExpense.value.amount && newExpense.value.payer) {
        expenses.value.unshift({ ...newExpense.value });
        newExpense.value.item = "";
        newExpense.value.amount = "";
      }
    };
    const removeExpense = (idx) => expenses.value.splice(idx, 1);

    // --- 上傳：頭像 / 優惠券（改成壓縮） ---
    const handleAvatarUpload = async (e) => {
      const file = e.target.files?.[0];
      if (!file) return;
      shisaLogo.value = await compressImageSquare(file, 200, 0.6);
      scheduleSave(); // ✅ 改成 debounce 寫入
    };

    const handleCouponUpload = async (e) => {
      const file = e.target.files?.[0];
      if (!file) return;
      // ✅ 不裁切、保留比例，避免優惠券文字被切掉
      const compressed = await compressImageKeepRatio(file, 1200, 0.75);
      coupons.value.unshift({ image: compressed, note: "" });
      // 由 watch + debounce 自動存
    };

    const removeCoupon = (idx) => {
      if (confirm("確定刪除？")) coupons.value.splice(idx, 1);
    };

    // --- Firebase 寫入：改 debounce 避免狂寫 ---
    const saveTripList = () => set(dbRef(db, "shisa_trip_index"), tripList.value);

    const saveCurrentTripData = () => {
      if (!currentTripId.value) return;
      set(dbRef(db, "trips/" + currentTripId.value), {
        shisaLogo: shisaLogo.value,
        days: days.value,
        expenses: expenses.value,
        setup: setup.value,
        packingList: packingList.value,
        coupons: coupons.value,
        participantsStr: participantsStr.value
      });
    };

    let saveTimer = null;
    const scheduleSave = () => {
      clearTimeout(saveTimer);
      saveTimer = setTimeout(saveCurrentTripData, 400);
    };

    // 標題與清單同步
    const syncTripName = () => {
      const trip = tripList.value.find((t) => t.id === currentTripId.value);
      if (trip) trip.destination = setup.value.destination;
      saveTripList();
      scheduleSave();
    };

    // --- 旅程管理 ---
    const generateId = () => "shisa_" + Date.now().toString(36);

    const createNewTrip = () => {
      setup.value = { destination: "", startDate: new Date().toISOString().split("T")[0], days: 5, rate: safeRate.value };
      showSetupModal.value = true;
      showTripMenu.value = false;
    };

    const initTrip = () => {
      if (!setup.value.destination) return alert("請輸入目的地");
      const newId = generateId();
      const start = new Date(setup.value.startDate);

      const newDays = Array.from({ length: setup.value.days }, (_, i) => {
        const d = new Date(start);
        d.setDate(start.getDate() + i);
        return {
          date: `${d.getMonth() + 1}/${d.getDate()} (${["日", "一", "二", "三", "四", "五", "六"][d.getDay()]})`,
          shortDate: `${d.getMonth() + 1}/${d.getDate()}`,
          fullDate: d.toISOString().split("T")[0],
          items: [],
          flight: null
        };
      });

      tripList.value.unshift({ id: newId, destination: setup.value.destination, startDate: setup.value.startDate, daysCount: setup.value.days });
      saveTripList();

      days.value = newDays;
      expenses.value = [];
      packingList.value = [];
      coupons.value = [];
      currentTripId.value = newId;

      showSetupModal.value = false;
      scheduleSave();
    };

    // ✅ 修：避免 switchTrip 每切一次就多掛一個 onValue 監聽器
    let tripUnsub = null;

    const switchTrip = (id) => {
      if (tripUnsub) tripUnsub(); // 解除舊監聽

      currentTripId.value = id;
      showTripMenu.value = false;

      tripUnsub = onValue(dbRef(db, "trips/" + id), (snapshot) => {
        const data = snapshot.val();
        if (!data) return;

        shisaLogo.value = data.shisaLogo || DEFAULT_LOGO;
        days.value = data.days || [];
        expenses.value = data.expenses || [];
        setup.value = data.setup || {};
        packingList.value = data.packingList || [];
        coupons.value = data.coupons || [];
        participantsStr.value = data.participantsStr || "我, 旅伴A";
      });
    };

    const deleteTrip = (id) => {
      if (!confirm("確定刪除？")) return;
      tripList.value = tripList.value.filter((t) => t.id !== id);
      set(dbRef(db, "trips/" + id), null);
      saveTripList();

      if (currentTripId.value === id) {
        if (tripList.value.length > 0) switchTrip(tripList.value[0].id);
        else {
          currentTripId.value = null;
          showSetupModal.value = true;
        }
      }
    };

    // --- 初始化：讀取旅程清單 ---
    onMounted(() => {
      onValue(dbRef(db, "shisa_trip_index"), (snapshot) => {
        const index = snapshot.val();
        if (index) {
          tripList.value = index;
          if (!currentTripId.value && tripList.value.length > 0) {
            switchTrip(tripList.value[0].id);
          }
        } else {
          showSetupModal.value = true;
        }
      });
    });

    onBeforeUnmount(() => {
      if (tripUnsub) tripUnsub();
      clearTimeout(saveTimer);
    });

    // ✅ 深度監聽仍保留，但改成 debounce 存檔
    watch([days, expenses, packingList, setup, coupons, participantsStr], scheduleSave, { deep: true });

    // --- Map ---
    let map = null;
    const initMap = async () => {
      await nextTick();
      if (map) map.remove();
      map = L.map("map", { zoomControl: false }).setView([26.2124, 127.6809], 11);
      L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png").addTo(map);
    };

    const centerOnUser = () => {
      if ("geolocation" in navigator) {
        navigator.geolocation.getCurrentPosition((pos) => {
          if (map) map.flyTo([pos.coords.latitude, pos.coords.longitude], 15);
        });
      }
    };

    watch(viewMode, (v) => {
      if (v === "map") initMap();
    });

    return {
      shisaLogo,
      handleAvatarUpload,
      syncTripName,

      viewMode,
      currentDayIdx,
      days,
      currentDay,
      addItem,
      removeItem,
      addDay,
      toggleFlightCard,

      expenses,
      totalExpense,
      newExpense,
      addExpense,
      removeExpense,

      setup,
      showSetupModal,
      initTrip,

      packingList,
      newItemName,
      addPackItem,
      removePackItem,
      packingProgress,

      initMap,
      centerOnUser,

      participantsStr,
      participants,
      paidByPerson,

      coupons,
      handleCouponUpload,
      removeCoupon,

      showTripMenu,
      tripList,
      currentTripId,
      createNewTrip,
      switchTrip,
      deleteTrip,

      getGoogleMapLink
    };
  }
}).mount("#app");
</script>
